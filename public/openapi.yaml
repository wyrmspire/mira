openapi: 3.1.0
info:
  title: Mira Studio API
  description: Gateway for the Mira experience engine and Goal OS. GPT operations go through 7 endpoints. All /create and /update payloads are FLAT (no nesting under a "payload" key).
  version: 2.2.0
servers:
  - url: https://mira-maddyup.vercel.app/  
    description: Mira Studio Backend

paths:
  /api/gpt/state:
    get:
      operationId: getGPTState
      summary: Get user state on re-entry
      description: Returns compressed state with active experiences, re-entry prompts, friction signals, knowledge summary, and curriculum progress. Call this first on every conversation.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            default: "a0000000-0000-0000-0000-000000000001"
          description: User ID. Defaults to the dev user.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  latestExperiences:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  activeReentryPrompts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  frictionSignals:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  suggestedNext:
                    type: array
                    items:
                      type: string
                  proposedExperiences:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  knowledgeSummary:
                    type: object
                    nullable: true
                    additionalProperties: true
                  operational_context:
                    type: object
                    nullable: true
                    description: "Sprint 24: Operational handles for memory and boards."
                    properties:
                      memory_count:
                        type: integer
                      recent_memory_ids:
                        type: array
                        items:
                          type: string
                      active_topics:
                        type: array
                        items:
                          type: string
                      boards:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            purpose:
                              type: string
                            nodeCount:
                              type: integer
                  pending_enrichments:
                    type: array
                    items:
                      type: object
                      properties:
                        topic:
                          type: string
                        status:
                          type: string
                        requested_at:
                          type: string
                  goal:
                    type: object
                    nullable: true
                    additionalProperties: true
                  skill_domains:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  curriculum:
                    type: object
                    properties:
                      active_outlines:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      recent_completions:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                  boards:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  graph:
                    type: object
                    additionalProperties: true

  /api/gpt/plan:
    post:
      operationId: planCurriculum
      summary: Scoping, planning, and reading operations
      description: Create curriculum outlines, dispatch research, assess gaps, read mind maps, or read full experience data. Flat payload — all fields alongside action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [create_outline, dispatch_research, assess_gaps, read_map, list_boards, read_board, read_experience]
                  description: The planning action to perform.
                topic:
                  type: string
                  description: The learning topic (required for create_outline and dispatch_research).
                domain:
                  type: string
                  description: Optional broad domain grouping.
                subtopics:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      description:
                        type: string
                      order:
                        type: integer
                  description: Optional subtopic breakdown for create_outline.
                pedagogicalIntent:
                  type: string
                  enum: [build_understanding, develop_skill, explore_concept, problem_solve]
                  description: The learning intent.
                outlineId:
                  type: string
                  description: Required for assess_gaps. The outline to analyze.
                goalId:
                  type: string
                  description: Optional. Links the outline to a goal. If provided, auto-activates the goal.
                userId:
                  type: string
                  default: "a0000000-0000-0000-0000-000000000001"
                boardId:
                  type: string
                  description: For action=read_map/read_board — the board UUID to read.
                experienceId:
                  type: string
                  description: For action=read_experience — the experience instance UUID to read.
      responses:
        '200':
          description: Success
        '201':
          description: Outline created
        '400':
          description: Validation error

  /api/gpt/create:
    post:
      operationId: createEntity
      summary: Create experiences, ideas, goals, steps, knowledge, skill domains, map objects, memories, or boards
      description: |
        FLAT payload — all fields alongside `type`. Do NOT nest under a `payload` key.
        Call GET /api/gpt/discover?capability=<type> for the exact schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [experience, ephemeral, idea, step, goal, knowledge, skill_domain, map_node, map_edge, map_cluster, memory, board, board_from_text]
                  description: The entity type to create.
                templateId:
                  type: string
                  description: UUID of the experience template. Call discover?capability=templates for valid IDs.
                userId:
                  type: string
                  default: "a0000000-0000-0000-0000-000000000001"
                title:
                  type: string
                  description: Title of the experience, idea, or step.
                goal:
                  type: string
                  description: For experiences — what the user will achieve.
                description:
                  type: string
                  description: For goals/memories/nodes — content or summary.
                resolution:
                  type: object
                  properties:
                    depth:
                      type: string
                      enum: [light, medium, heavy]
                    mode:
                      type: string
                      enum: [illuminate, practice, challenge, build, reflect, study]
                    timeScope:
                      type: string
                      enum: [immediate, session, multi_day, ongoing]
                    intensity:
                      type: string
                      enum: [low, medium, high]
                reentry:
                  type: object
                  properties:
                    trigger:
                      type: string
                      enum: [time, completion, inactivity, manual]
                    prompt:
                      type: string
                    contextScope:
                      type: string
                      enum: [minimal, full, focused]
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [lesson, challenge, reflection, questionnaire, essay_tasks, plan_builder, checkpoint]
                      title:
                        type: string
                      payload:
                        type: object
                        additionalProperties: true
                      blocks:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                  description: Array of steps for the experience.
                curriculum_outline_id:
                  type: string
                previousExperienceId:
                  type: string
                domains:
                  type: array
                  items:
                    type: string
                goalId:
                  type: string
                name:
                  type: string
                  description: REQUIRED for skill_domain or board.
                purpose:
                  type: string
                  enum: [general, idea_planning, curriculum_review, lesson_plan, research_tracking, strategy]
                  description: For type=board.
                linkedEntityId:
                  type: string
                linkedEntityType:
                  type: string
                  enum: [goal, experience, knowledge]
                kind:
                  type: string
                  enum: [observation, strategy, idea, preference, tactic, assessment, note]
                  description: For type=memory.
                memory_class:
                  type: string
                  enum: [semantic, episodic, procedural]
                  description: For type=memory.
                topic:
                  type: string
                  description: REQUIRED for memory or outline.
                content:
                  type: string
                  description: For type=memory/knowledge/map_node.
                tags:
                  type: array
                  items:
                    type: string
                rawPrompt:
                  type: string
                gptSummary:
                  type: string
                prompt:
                  type: string
                  description: For type=board_from_text.
                experienceId:
                  type: string
                boardId:
                  type: string
                label:
                  type: string
                color:
                  type: string
                position_x:
                  type: number
                position_y:
                  type: number
                sourceNodeId:
                  type: string
                targetNodeId:
                  type: string
                centerNode:
                  type: object
                childNodes:
                  type: array
                  items:
                    type: object
                step_type:
                  type: string
                  enum: [lesson, challenge, reflection, questionnaire, essay_tasks, plan_builder, checkpoint]
                sections:
                  type: array
                  items:
                    type: object
                prompts:
                  type: array
                  items:
                    type: object
                questions:
                  type: array
                  items:
                    type: object
                tasks:
                  type: array
                  items:
                    type: object
                knowledge_unit_id:
                  type: string
                passing_threshold:
                  type: integer
                on_fail:
                  type: string
                payload:
                  type: object
                blocks:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: Created
        '400':
          description: Validation error

  /api/gpt/update:
    post:
      operationId: updateEntity
      summary: Edit steps, transition status, link knowledge, update nodes, or manage memory/boards
      description: |
        FLAT payload — all fields alongside `action`. Do NOT nest under a "payload" key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [update_step, reorder_steps, delete_step, transition, link_knowledge, update_knowledge, update_skill_domain, update_map_node, delete_map_node, delete_map_edge, transition_goal, memory_update, memory_delete, consolidate_memory, rename_board, archive_board, reparent_node, expand_board_branch, suggest_board_gaps]
                  description: The mutation action to perform.
                experienceId:
                  type: string
                transitionAction:
                  type: string
                  enum: [approve, publish, activate, start, pause, complete, archive, kill, revive, supersede]
                stepId:
                  type: string
                stepPayload:
                  type: object
                stepOrder:
                  type: array
                  items:
                    type: string
                knowledgeUnitId:
                  type: string
                linkType:
                  type: string
                  enum: [teaches, tests, deepens, pre_support, enrichment]
                unitId:
                  type: string
                memoryId:
                  type: string
                  description: For memory_update or memory_delete.
                lookbackHours:
                  type: integer
                  description: For consolidate_memory.
                updates:
                  type: object
                  additionalProperties: true
                domainId:
                  type: string
                boardId:
                  type: string
                  description: REQUIRED for board actions.
                nodeId:
                  type: string
                sourceNodeId:
                  type: string
                  description: For reparent_node.
                edgeId:
                  type: string
                label:
                  type: string
                description:
                  type: string
                content:
                  type: string
                metadata:
                  type: object
                nodeType:
                  type: string
                goalId:
                  type: string
                name:
                  type: string
                  description: For rename_board.
                count:
                  type: integer
                  description: For expand_board_branch.
                depth:
                  type: integer
                  description: For expand_board_branch.
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error

  /api/gpt/memory:
    get:
      operationId: listMemories
      summary: Query persistent agent memories
      description: Query the "Notebook" layer of agent memory. Entries are filtered by kind, topic, or content.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: Optional User ID.
        - name: kind
          in: query
          required: false
          schema:
            type: string
          description: Filter by memory kind (observation, preference, etc).
        - name: topic
          in: query
          required: false
          schema:
            type: string
          description: Filter by topic string.
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Keyword search in memory content.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  totalCount:
                    type: integer
                  lastRecordedAt:
                    type: string
                    nullable: true

  /api/gpt/changes:
    get:
      operationId: getChangeReports
      summary: View user-reported UI/UX changes and bugs
      description: Returns all open feedback reported via the Changes floater.
      responses:
        '200':
          description: Success

  /api/gpt/discover:
    get:
      operationId: discoverCapability
      summary: Learn schemas and valid values at runtime
      description: Progressive disclosure — ALWAYS call this before your first create or update of a given type.
      parameters:
        - name: capability
          in: query
          required: true
          schema:
            type: string
          description: "Capabilities: templates, create_experience, step_payload, resolution, create_outline, dispatch_research, goal, create_knowledge, skill_domain, create_map_node, create_map_edge, create_map_cluster, update_map_node, delete_map_node, delete_map_edge, memory_record, memory_read, memory_correct, consolidate_memory, create_board, list_boards, read_map, read_board"
        - name: step_type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Schema, examples, and usage guidance

  /api/knowledge:
    get:
      operationId: readKnowledge
      summary: Read knowledge base content
      description: Returns full knowledge units.
      parameters:
        - name: domain
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Knowledge units grouped by domain.
          content:
            application/json:
              schema:
                type: object
                properties:
                  units:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                  total:
                    type: integer
                  domains:
                    type: object
                    additionalProperties:
                      type: integer
