openapi: 3.1.0
info:
  title: Mira Studio API
  description: Gateway for the Mira experience engine. All GPT operations go through 5 endpoints.
  version: 2.0.0
servers:
  - url: https://mira-maddyup.vercel.app/  
    description: Mira Studio Backend

paths:
  /api/gpt/state:
    get:
      operationId: getGPTState
      summary: Get user state on re-entry
      description: Returns compressed state with active experiences, re-entry prompts, friction signals, knowledge summary, and curriculum progress. Call this first on every conversation.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            default: "a0000000-0000-0000-0000-000000000001"
          description: User ID. Defaults to the dev user.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  latestExperiences:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  activeReentryPrompts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  frictionSignals:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  suggestedNext:
                    type: array
                    items:
                      type: string
                  proposedExperiences:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  knowledgeSummary:
                    type: object
                    nullable: true
                    additionalProperties: true
                  curriculum:
                    type: object
                    properties:
                      active_outlines:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      recent_completions:
                        type: array
                        items:
                          type: object
                          additionalProperties: true

  /api/gpt/plan:
    post:
      operationId: planCurriculum
      summary: Scoping and planning operations
      description: Create curriculum outlines, dispatch research, or assess learning gaps before generating experiences.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, payload]
              properties:
                action:
                  type: string
                  enum: [create_outline, dispatch_research, assess_gaps]
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Success
        '201':
          description: Outline created
        '400':
          description: Validation error

  /api/gpt/create:
    post:
      operationId: createEntity
      summary: Create experiences, ideas, or steps
      description: Discriminated by `type`. Call discover first to learn the exact schema for each type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, payload]
              properties:
                type:
                  type: string
                  enum: [experience, ephemeral, idea, step]
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Created
        '400':
          description: Validation error

  /api/gpt/update:
    post:
      operationId: updateEntity
      summary: Edit steps, transition status, link knowledge
      description: Discriminated by `action`. Use for step mutations, lifecycle transitions, and knowledge linking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, payload]
              properties:
                action:
                  type: string
                  enum: [update_step, reorder_steps, delete_step, transition, link_knowledge]
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated

  /api/gpt/discover:
    get:
      operationId: discoverCapability
      summary: Learn schemas and valid values at runtime
      description: Progressive disclosure — ask how to perform any action and get the exact schema, examples, and related capabilities.
      parameters:
        - name: capability
          in: query
          required: true
          schema:
            type: string
          description: "The capability to learn about. Examples: templates, create_experience, step_payload, resolution, create_outline"
        - name: step_type
          in: query
          required: false
          schema:
            type: string
          description: "Optional filter for step_payload (e.g. lesson, checkpoint, challenge)"
      responses:
        '200':
          description: Schema, examples, and usage guidance
          content:
            application/json:
              schema:
                type: object
                properties:
                  capability:
                    type: string
                  endpoint:
                    type: string
                  description:
                    type: string
                  schema:
                    type: object
                    nullable: true
                    additionalProperties: true
                  example:
                    type: object
                    nullable: true
                    additionalProperties: true
                  when_to_use:
                    type: string
        '400':
          description: Unknown capability (returns list of valid capabilities)
