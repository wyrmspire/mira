openapi: 3.1.0
info:
  title: Mira Studio API
  description: Gateway for the Mira experience engine and Goal OS. GPT operations go through 7 endpoints. All /create and /update payloads are FLAT (no nesting under a "payload" key).
  version: 2.2.0
servers:
  - url: https://mira-maddyup.vercel.app/  
    description: Mira Studio Backend

paths:
  /api/gpt/state:
    get:
      operationId: getGPTState
      summary: Get user state on re-entry
      description: Returns compressed state with active experiences, re-entry prompts, friction signals, knowledge summary, and curriculum progress. Call this first on every conversation.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            default: "a0000000-0000-0000-0000-000000000001"
          description: User ID. Defaults to the dev user.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/gpt/plan:
    post:
      operationId: planCurriculum
      summary: Scoping and planning operations
      description: Create curriculum outlines, dispatch research, assess gaps, or read mind maps. Flat payload — all fields alongside action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [create_outline, dispatch_research, assess_gaps, read_map]
                topic:
                  type: string
                  description: Required for create_outline and dispatch_research.
                domain:
                  type: string
                subtopics:
                  type: array
                  items:
                    type: object
                    properties:
                      title: { type: string }
                      description: { type: string }
                      order: { type: integer }
                pedagogicalIntent:
                  type: string
                  enum: [build_understanding, develop_skill, explore_concept, problem_solve]
                outlineId:
                  type: string
                  description: Required for assess_gaps.
                goalId:
                  type: string
                  description: Optional. Links outline to a goal and auto-activates it.
                boardId:
                  type: string
                  description: For action=read_map — the board UUID to read.
                userId:
                  type: string
                  default: "a0000000-0000-0000-0000-000000000001"
      responses:
        '200':
          description: Success
        '201':
          description: Outline created
        '400':
          description: Validation error

  /api/gpt/create:
    post:
      operationId: createEntity
      summary: Create experiences, ideas, goals, steps, knowledge, skill domains, or map objects
      description: |
        FLAT payload — all fields alongside `type`. Do NOT nest under a `payload` key.
        Call GET /api/gpt/discover?capability=<type> for the exact schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [experience, ephemeral, idea, step, goal, knowledge, skill_domain, map_node, map_edge, map_cluster]
                templateId:
                  type: string
                  description: For experience/ephemeral — UUID of the template. REQUIRED.
                userId:
                  type: string
                  default: "a0000000-0000-0000-0000-000000000001"
                title:
                  type: string
                goal:
                  type: string
                  description: For experiences — what the user will achieve.
                description:
                  type: string
                  description: For goals — what you want to accomplish.
                resolution:
                  type: object
                  properties:
                    depth:
                      type: string
                      enum: [light, medium, heavy]
                    mode:
                      type: string
                      enum: [illuminate, practice, challenge, build, reflect, study]
                    timeScope:
                      type: string
                      enum: [immediate, session, multi_day, ongoing]
                    intensity:
                      type: string
                      enum: [low, medium, high]
                reentry:
                  type: object
                  properties:
                    trigger:
                      type: string
                      enum: [time, completion, inactivity, manual]
                    prompt:
                      type: string
                    contextScope:
                      type: string
                      enum: [minimal, full, focused]
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [lesson, challenge, reflection, questionnaire, essay_tasks, plan_builder, checkpoint]
                      title:
                        type: string
                      payload:
                        type: object
                        additionalProperties: true
                  description: Inline steps for experience creation.
                curriculum_outline_id:
                  type: string
                previousExperienceId:
                  type: string
                domains:
                  type: array
                  items:
                    type: string
                  description: For goals — auto-creates skill domains.
                goalId:
                  type: string
                  description: For skill_domain — REQUIRED existing goal UUID.
                name:
                  type: string
                  description: For skill_domain — REQUIRED domain name.
                experienceId:
                  type: string
                  description: For steps — the experience instance to add the step to.
                rawPrompt:
                  type: string
                  description: For ideas — the raw user prompt.
                gptSummary:
                  type: string
                  description: For ideas — GPT's summary.
                boardId:
                  type: string
                  description: For map nodes/edges — optional board UUID.
                label:
                  type: string
                  description: For map nodes — label text.
                content:
                  type: string
                  description: For map nodes — long-form elaboration.
                color:
                  type: string
                position_x:
                  type: number
                position_y:
                  type: number
                sourceNodeId:
                  type: string
                targetNodeId:
                  type: string
                centerNode:
                  type: object
                  properties:
                    label: { type: string }
                    description: { type: string }
                    color: { type: string }
                    position_x: { type: number }
                    position_y: { type: number }
                childNodes:
                  type: array
                  items:
                    type: object
                    properties:
                      label: { type: string }
                      description: { type: string }
                      color: { type: string }
      responses:
        '201':
          description: Created
        '400':
          description: Validation error — includes field-level details

  /api/gpt/update:
    post:
      operationId: updateEntity
      summary: Edit steps, transition status, link knowledge, update nodes
      description: |
        FLAT payload — all fields alongside `action`. Do NOT nest under a "payload" key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [update_step, reorder_steps, delete_step, transition, link_knowledge, update_knowledge, update_skill_domain, update_map_node, delete_map_node, delete_map_edge]
                experienceId:
                  type: string
                transitionAction:
                  type: string
                  enum: [approve, publish, activate, start, complete, archive]
                stepId:
                  type: string
                stepPayload:
                  type: object
                  additionalProperties: true
                stepOrder:
                  type: array
                  items:
                    type: string
                knowledgeUnitId:
                  type: string
                linkType:
                  type: string
                  enum: [teaches, tests, deepens, pre_support, enrichment]
                unitId:
                  type: string
                updates:
                  type: object
                  additionalProperties: true
                domainId:
                  type: string
                nodeId:
                  type: string
                edgeId:
                  type: string
                label:
                  type: string
                content:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                nodeType:
                  type: string
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error

  /api/gpt/changes:
    get:
      operationId: getChangeReports
      summary: View user-reported UI/UX changes and bugs
      description: Returns all open feedback, bugs, and change requests reported by the user.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        type: { type: string, enum: [bug, ux, idea, change, comment] }
                        url: { type: string }
                        content: { type: string }
                        status: { type: string, enum: [open, resolved] }
                        createdAt: { type: string }

  /api/gpt/discover:
    get:
      operationId: discoverCapability
      summary: Learn schemas and valid values at runtime
      description: Progressive disclosure — ask how to perform any action and get the exact schema, examples, and related capabilities. ALWAYS call this before your first create or update.
      parameters:
        - name: capability
          in: query
          required: true
          schema:
            type: string
          description: "Examples: templates, create_experience, step_payload, resolution, create_outline, goal, skill_domain, create_map_node, create_map_cluster"
        - name: step_type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Schema, examples, and usage guidance
        '400':
          description: Unknown capability

  /api/knowledge:
    get:
      operationId: readKnowledge
      summary: Read knowledge base content
      description: Returns full knowledge units with content, thesis, key ideas, and metadata. Use this to read research results and reference them when building experiences.
      parameters:
        - name: domain
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Knowledge units grouped by domain
          content:
            application/json:
              schema:
                type: object
                properties:
                  units:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: string }
                          title: { type: string }
                          thesis: { type: string }
                          content: { type: string }
                          key_ideas:
                            type: array
                            items: { type: string }
                          unit_type: { type: string }
                          topic: { type: string }
                          domain: { type: string }
                  total: { type: integer }
